<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <header>
        <h1>Simulação de Kits</h1>
    </header>

    <main>

        
        <button>Novo pedido</button>

        <div class="novo_pedido">

            <div class="tipo">
                <label for="">Tipo de kit:</label>
                <select name="" id="">
                    <option value="simples_epoxi">Simples Epoxi</option>
                    <option value="simples_ecowood">Simples Ecowood</option>
                    <option value="duplo_epoxi">Duplo Epoxi</option>
                    <option value="duplo_ecowood">Duplo Ecowood</option>
                </select>
            </div>

            <div class="numero">
                <label for="">Número</label>
                <input type="radio" id="n1" name="numero" value="1" checked>
                <label for="n1">nº1</label>

                <input type="radio" id="n2" name="numero" value="2">
                <label for="n2">nº2</label>
            </div>

            <div class="emenda">
                <label for="">Tem emenda</label>
                <input type="radio" id="sim" name="emenda" value="sim" checked>
                <label for="sim">Sim</label>

                <input type="radio" id="nao" name="emenda" value="nao">
                <label for="nao">Não</label>
            </div>

            <div class="medida">
                <label for="">Medida</label>
                <select name="" id="">
                    <option value="1.0">1,00 metro</option>
                    <option value="1.5">1,50 metro</option>
                    <option value="2.0">2,00 metros</option>
                    <option value="2.5">2,50 metros</option>
                    <option value="3.0">3,00 metros</option>
                    <option value="3.5">3,50 metros</option>
                    <option value="4.0">4,00 metros</option>
                </select>
            </div>

            <button>Adicionar</button>

        </div>

        <button>Finalizar Pedido</button>

    </main>

</body>
</html>
